backend:
  name: github
  repo: burcucirtlik/websiteProject
  branch: main
  auth_endpoint: https://websiteproject-auth.burcucirtlik.workers.dev/auth
  app_id: Ov23liagb7pwiXxXuNSw
local_backend: false
site_url: https://kunterbuntjuggling.com
display_url: https://kunterbuntjuggling.com
auth_redirect: https://kunterbuntjuggling.com/admin/auth.html
media_folder: "public/uploads"
public_folder: "/uploads"
publish_mode: editorial_workflow
collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "public/content/site.json"
        label: "Homepage"
        name: "homepage"
        format: "json"
        fields:
          - { label: "Festival Name", name: "festivalName", widget: "string" }
          - { label: "Header Meta", name: "headerMeta", widget: "string" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Lead", name: "heroLead", widget: "text" }
          - { label: "Hero GIF URL", name: "heroGifUrl", widget: "string" }
          - { label: "Note", name: "note", widget: "text" }
          - { label: "Ticket Button Label", name: "ticketButtonLabel", widget: "string" }
          - { label: "Ticket URL", name: "ticketUrl", widget: "string" }
          - { label: "Support Title", name: "supportTitle", widget: "string" }
          - { label: "Support Description", name: "supportDescription", widget: "text" }
          - { label: "Support Button Label", name: "supportButtonLabel", widget: "string" }
          - { label: "GoFundMe URL", name: "gofundmeUrl", widget: "string" }
          - { label: "Dates Label", name: "datesLabel", widget: "string" }
          - { label: "Dates Value", name: "datesValue", widget: "string" }
          - { label: "Location Label", name: "locationLabel", widget: "string" }
          - { label: "Location Value", name: "locationValue", widget: "string" }
          - { label: "Venue Title", name: "venueTitle", widget: "string" }
          - { label: "Venue Description", name: "venueDescription", widget: "text" }
          - { label: "Travel Title", name: "travelTitle", widget: "string" }
          - { label: "Travel Description", name: "travelDescription", widget: "text" }
          - label: "Travel Sections"
            name: "travelSections"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Faq Title", name: "faqTitle", widget: "string" }
          - { label: "Faq Description", name: "faqDescription", widget: "string" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
          - { label: "Partners Title", name: "partnersTitle", widget: "string" }
          - { label: "Partners Description", name: "partnersDescription", widget: "string" }
          - { label: "Partners", name: "partners", widget: "list" }
          - { label: "Contact Title", name: "contactTitle", widget: "string" }
          - { label: "Contact Description", name: "contactDescription", widget: "text" }
          - { label: "Footer Title", name: "footerTitle", widget: "string" }
          - { label: "Footer Description", name: "footerDescription", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "Instagram Label", name: "instagramLabel", widget: "string" }
          - { label: "Terms Title", name: "termsTitle", widget: "string" }
          - { label: "Terms Description", name: "termsDescription", widget: "text" }
          - { label: "Privacy Document 1 Label", name: "privacyDocumentOneLabel", widget: "string" }
          - { label: "Privacy Document 1 PDF", name: "privacyDocumentOneUrl", widget: "file", required: false, media_library: { config: { multiple: false } } }
          - { label: "Privacy Document 2 Label", name: "privacyDocumentTwoLabel", widget: "string" }
          - { label: "Privacy Document 2 PDF", name: "privacyDocumentTwoUrl", widget: "file", required: false, media_library: { config: { multiple: false } } }
          - { label: "Footer Copyright", name: "footerCopyright", widget: "string" }
